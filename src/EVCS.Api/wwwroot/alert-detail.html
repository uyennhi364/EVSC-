<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EVC Management - Alert Detail</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: "#f0fdf4",
              500: "#22c55e",
              600: "#16a34a",
              700: "#15803d"
            }
          },
          boxShadow: {
            panel: "0 18px 40px rgba(15, 23, 42, 0.10)"
          }
        }
      }
    };
  </script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <div class="min-h-screen">
    <div class="flex-1">
      <header class="border-b border-emerald-200 bg-emerald-50">
        <div class="flex items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
          <div>
            <p class="text-sm text-emerald-600">Dashboard / Alert Center</p>
            <h2 class="mt-1 text-2xl font-semibold text-emerald-950">Alert Detail</h2>
          </div>

          <div class="flex items-center gap-3">
            <a
              href="alerts.html"
              id="notificationBell"
              class="relative inline-flex h-14 w-14 items-center justify-center rounded-[14px] text-[#39B86B] transition hover:opacity-95 hover:text-[#2fa75d]"
              aria-label="Open alerts page"
            >
              <svg class="h-14 w-14" viewBox="0 0 64 64" fill="none" aria-hidden="true">
                <rect x="1" y="1" width="62" height="62" rx="16" fill="#D8F2DF"/>
                <path d="M32 20C28.134 20 25 23.134 25 27V29.712C25 30.534 24.734 31.334 24.242 31.994L22.803 33.921C21.694 35.406 22.754 37.5 24.607 37.5H39.393C41.246 37.5 42.306 35.406 41.197 33.921L39.758 31.994C39.266 31.334 39 30.534 39 29.712V27C39 23.134 35.866 20 32 20Z" fill="currentColor"/>
                <path d="M28.5 39.25C29.123 41.109 30.268 42 32 42C33.732 42 34.877 41.109 35.5 39.25H28.5Z" fill="currentColor"/>
              </svg>
              <span id="notificationBadge" class="absolute -right-1 -top-1 hidden min-w-[24px] rounded-full border-2 border-[#f4fff7] bg-[#f2486a] px-[7px] text-center text-[11px] font-bold leading-5 text-white shadow-[0_4px_10px_rgba(242,72,106,0.28)]">0</span>
            </a>
          </div>
        </div>
      </header>

      <main class="px-4 py-6 sm:px-6 lg:px-8">
        <div class="mb-6 flex flex-wrap items-center justify-between gap-3">
          <a href="alerts.html" class="inline-flex items-center gap-2 rounded-lg bg-green-500 px-4 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-green-600">
            <span aria-hidden="true">←</span>
            <span>Back</span>
          </a>
        </div>

        <div id="detailContainer" class="grid gap-6 xl:grid-cols-[minmax(0,1fr)_360px]">
          <section class="rounded-3xl border border-slate-200 bg-white p-6 shadow-panel">
            <div class="flex flex-col gap-4 border-b border-slate-100 pb-5">
              <div class="flex flex-wrap items-start justify-between gap-4">
                <div>
                  <p class="text-sm text-slate-500">Alert</p>
                  <h3 id="detailTitle" class="mt-1 text-2xl font-semibold text-slate-900"></h3>
                </div>
                <div class="flex items-center gap-3">
                  <span id="detailSeverityBadge" class="inline-flex rounded-full px-3 py-1 text-sm font-semibold"></span>
                  <span id="detailStatusBadge" class="inline-flex rounded-full px-3 py-1 text-sm font-semibold"></span>
                </div>
              </div>
              <p id="detailDescription" class="max-w-3xl text-sm leading-7 text-slate-600"></p>
            </div>

            <div class="grid gap-4 pt-6 md:grid-cols-2">
              <div class="rounded-2xl border border-slate-200 bg-slate-50 p-4">
                <div class="text-xs uppercase tracking-wide text-slate-400">Related Station</div>
                <div id="detailStation" class="mt-2 text-base font-semibold text-slate-900"></div>
              </div>
              <div class="rounded-2xl border border-slate-200 bg-slate-50 p-4">
                <div class="text-xs uppercase tracking-wide text-slate-400">Timestamp</div>
                <div id="detailTime" class="mt-2 text-base font-semibold text-slate-900"></div>
              </div>
              <div class="rounded-2xl border border-slate-200 bg-slate-50 p-4 md:col-span-2">
                <div class="text-xs uppercase tracking-wide text-slate-400">Suggested Solution</div>
                <div id="detailSuggestion" class="mt-2 text-sm leading-7 text-slate-600"></div>
              </div>
            </div>

            <div class="mt-6 flex flex-wrap gap-3">
              <button id="maintenanceBtn" type="button" class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-medium text-slate-700 transition hover:border-brand-200 hover:text-brand-700">Create Maintenance Request</button>
              <button id="technicianBtn" type="button" class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-medium text-slate-700 transition hover:border-brand-200 hover:text-brand-700">Call Technician</button>
              <button id="resolveBtn" type="button" class="rounded-2xl bg-brand-500 px-4 py-3 text-sm font-semibold text-white transition hover:bg-brand-600">Mark as Resolved</button>
            </div>

            <div id="actionMessage" class="mt-4 hidden rounded-2xl border border-brand-100 bg-brand-50 px-4 py-3 text-sm text-brand-700"></div>
          </section>

          <aside class="rounded-3xl border border-slate-200 bg-white p-6 shadow-panel">
            <h4 class="text-base font-semibold text-slate-900">Alert History & Logs</h4>
            <div id="historyList" class="mt-4 space-y-3"></div>
          </aside>
        </div>

        <section id="notFoundState" class="hidden rounded-3xl border border-dashed border-slate-300 bg-white px-6 py-14 text-center shadow-panel">
          <h3 class="text-xl font-semibold text-slate-900">Alert not found</h3>
          <p class="mt-2 text-sm text-slate-500">The alert may have been removed or the URL is invalid.</p>
          <a href="alerts.html" class="mt-5 inline-flex rounded-2xl bg-brand-500 px-4 py-3 text-sm font-semibold text-white transition hover:bg-brand-600">Go to alerts page</a>
        </section>
      </main>
    </div>
  </div>

  <script src="./js/evcs-config.js"></script>
  <script src="./js/pages/alerts-store.js"></script>
  <script src="./js/pages/alert-detail.js"></script>
</body>
</html>
